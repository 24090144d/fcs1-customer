name: Onboard Customer

on:
  workflow_dispatch:
    inputs:
      customer_code:
        description: "Customer code (example: ACME)"
        required: true
        type: string
      customer_name:
        description: "Customer display name"
        required: true
        type: string
      domain:
        description: "Custom domain (optional)"
        required: false
        default: ""
        type: string
      region:
        description: "Azure region (metadata only for now)"
        required: true
        default: "eastus"
        type: string
      db_tier:
        description: "DB tier (metadata only for now)"
        required: true
        default: "B_Standard_B1ms"
        type: string
      release_ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
        type: string
      database_url:
        description: "Customer DATABASE_URL (optional; defaults to secret DATABASE_URL_<CUSTOMER_CODE>)"
        required: false
        default: ""
        type: string
      database_url_unpooled:
        description: "Customer direct/unpooled DATABASE_URL for schema init (optional; defaults to secret DATABASE_URL_UNPOOLED_<CUSTOMER_CODE>)"
        required: false
        default: ""
        type: string
      database_url_secret_name:
        description: "Optional repo secret name override (defaults to DATABASE_URL_<CUSTOMER_CODE>)"
        required: false
        default: ""
        type: string
      database_url_unpooled_secret_name:
        description: "Optional repo secret name override for the direct DB URL"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  onboard:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve GitHub repository metadata
        id: resolve_repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "repo_id=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.id')" >> "$GITHUB_OUTPUT"
          echo "repo_owner=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.owner.login')" >> "$GITHUB_OUTPUT"
          echo "repo_name=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.name')" >> "$GITHUB_OUTPUT"

      - name: Install PostgreSQL client
        run: |
          if command -v psql >/dev/null 2>&1; then
            echo "psql already installed; skipping apt install."
            psql --version
          else
            sudo apt-get update
            sudo apt-get install -y postgresql-client
            psql --version
          fi

      - name: Resolve database URL
        id: resolve_db_url
        env:
          INPUT_DATABASE_URL: ${{ inputs.database_url }}
          INPUT_DATABASE_URL_UNPOOLED: ${{ inputs.database_url_unpooled }}
          INPUT_DATABASE_URL_SECRET_NAME: ${{ inputs.database_url_secret_name }}
          INPUT_DATABASE_URL_UNPOOLED_SECRET_NAME: ${{ inputs.database_url_unpooled_secret_name }}
          CUSTOMER_CODE: ${{ inputs.customer_code }}
          DATABASE_URL_CN: ${{ secrets.DATABASE_URL_CN }}
          DATABASE_URL_UNPOOLED_CN: ${{ secrets.DATABASE_URL_UNPOOLED_CN }}
          DATABASE_URL_CHINA: ${{ secrets.DATABASE_URL_CHINA }}
          DATABASE_URL_UNPOOLED_CHINA: ${{ secrets.DATABASE_URL_UNPOOLED_CHINA }}
          DATABASE_URL_HK: ${{ secrets.DATABASE_URL_HK }}
          DATABASE_URL_UNPOOLED_HK: ${{ secrets.DATABASE_URL_UNPOOLED_HK }}
          DATABASE_URL_NEON: ${{ secrets.DATABASE_URL_NEON }}
          DATABASE_URL_UNPOOLED_NEON: ${{ secrets.DATABASE_URL_UNPOOLED_NEON }}
          DATABASE_URL_MY: ${{ secrets.DATABASE_URL_MY }}
          DATABASE_URL_UNPOOLED_MY: ${{ secrets.DATABASE_URL_UNPOOLED_MY }}
          DATABASE_URL_MO: ${{ secrets.DATABASE_URL_MO }}
          DATABASE_URL_UNPOOLED_MO: ${{ secrets.DATABASE_URL_UNPOOLED_MO }}
          DATABASE_URL_JP: ${{ secrets.DATABASE_URL_JP }}
          DATABASE_URL_UNPOOLED_JP: ${{ secrets.DATABASE_URL_UNPOOLED_JP }}
        run: |
          resolve_secret() {
            local secret_name="$1"
            case "$secret_name" in
              DATABASE_URL_CN) echo "$DATABASE_URL_CN" ;;
              DATABASE_URL_UNPOOLED_CN) echo "$DATABASE_URL_UNPOOLED_CN" ;;
              DATABASE_URL_CHINA) echo "$DATABASE_URL_CHINA" ;;
              DATABASE_URL_UNPOOLED_CHINA) echo "$DATABASE_URL_UNPOOLED_CHINA" ;;
              DATABASE_URL_HK) echo "$DATABASE_URL_HK" ;;
              DATABASE_URL_UNPOOLED_HK) echo "$DATABASE_URL_UNPOOLED_HK" ;;
              DATABASE_URL_NEON) echo "$DATABASE_URL_NEON" ;;
              DATABASE_URL_UNPOOLED_NEON) echo "$DATABASE_URL_UNPOOLED_NEON" ;;
              DATABASE_URL_MY) echo "$DATABASE_URL_MY" ;;
              DATABASE_URL_UNPOOLED_MY) echo "$DATABASE_URL_UNPOOLED_MY" ;;
              DATABASE_URL_MO) echo "$DATABASE_URL_MO" ;;
              DATABASE_URL_UNPOOLED_MO) echo "$DATABASE_URL_UNPOOLED_MO" ;;
              DATABASE_URL_JP) echo "$DATABASE_URL_JP" ;;
              DATABASE_URL_UNPOOLED_JP) echo "$DATABASE_URL_UNPOOLED_JP" ;;
              *)
                echo ""
                ;;
            esac
          }

          sanitize_url() {
            printf '%s' "$1" | sed 's/[?&]channel_binding=require//g'
          }

          runtime_url=""
          if [ -n "$INPUT_DATABASE_URL" ]; then
            runtime_url="$INPUT_DATABASE_URL"
          else
            secret_name="$INPUT_DATABASE_URL_SECRET_NAME"
            if [ -z "$secret_name" ]; then
              upper_code="$(printf '%s' "$CUSTOMER_CODE" | tr '[:lower:]' '[:upper:]')"
              secret_name="DATABASE_URL_${upper_code}"
            fi

            runtime_url="$(resolve_secret "$secret_name")"
            if [ -z "$runtime_url" ] && [ "$secret_name" = "DATABASE_URL_CN" ]; then
              runtime_url="$(resolve_secret 'DATABASE_URL_CHINA')"
            fi
            if [ -z "$runtime_url" ] && [ "$secret_name" = "DATABASE_URL_CHINA" ]; then
              runtime_url="$(resolve_secret 'DATABASE_URL_CN')"
            fi
            if [ -z "$runtime_url" ]; then
              echo "No database URL found. Set repo secret $secret_name or provide workflow input database_url."
              exit 1
            fi
          fi
          runtime_url="$(sanitize_url "$runtime_url")"
          echo "database_url=$runtime_url" >> "$GITHUB_OUTPUT"

          unpooled_url=""
          if [ -n "$INPUT_DATABASE_URL_UNPOOLED" ]; then
            unpooled_url="$INPUT_DATABASE_URL_UNPOOLED"
          else
            secret_name="$INPUT_DATABASE_URL_UNPOOLED_SECRET_NAME"
            if [ -z "$secret_name" ]; then
              upper_code="$(printf '%s' "$CUSTOMER_CODE" | tr '[:lower:]' '[:upper:]')"
              secret_name="DATABASE_URL_UNPOOLED_${upper_code}"
            fi

            unpooled_url="$(resolve_secret "$secret_name")"
            if [ -z "$unpooled_url" ] && [ "$secret_name" = "DATABASE_URL_UNPOOLED_CN" ]; then
              unpooled_url="$(resolve_secret 'DATABASE_URL_UNPOOLED_CHINA')"
            fi
            if [ -z "$unpooled_url" ] && [ "$secret_name" = "DATABASE_URL_UNPOOLED_CHINA" ]; then
              unpooled_url="$(resolve_secret 'DATABASE_URL_UNPOOLED_CN')"
            fi
            if [ -z "$unpooled_url" ]; then
              unpooled_url="$runtime_url"
            fi
          fi
          unpooled_url="$(sanitize_url "$unpooled_url")"
          echo "database_url_unpooled=$unpooled_url" >> "$GITHUB_OUTPUT"

      - name: Validate psql connectivity
        env:
          DATABASE_URL: ${{ steps.resolve_db_url.outputs.database_url_unpooled }}
        run: |
          psql --dbname="$DATABASE_URL" -c "select now();"

      - name: Initialize database schema and seed
        shell: pwsh
        run: |
          ./scripts/init-customer-db.ps1 `
            -DatabaseUrl "${{ steps.resolve_db_url.outputs.database_url }}" `
            -DatabaseUrlUnpooled "${{ steps.resolve_db_url.outputs.database_url_unpooled }}" `
            -CustomerCode "${{ inputs.customer_code }}" `
            -CustomerName "${{ inputs.customer_name }}"

      - name: Provision Vercel project and trigger deploy
        shell: pwsh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          ./scripts/onboard-customer.ps1 `
            -CustomerCode "${{ inputs.customer_code }}" `
            -CustomerName "${{ inputs.customer_name }}" `
            -DatabaseUrl "${{ steps.resolve_db_url.outputs.database_url }}" `
            -DatabaseUrlUnpooled "${{ steps.resolve_db_url.outputs.database_url_unpooled }}" `
            -GitHubRepoId "${{ steps.resolve_repo.outputs.repo_id }}" `
            -GitHubRepoOwner "${{ steps.resolve_repo.outputs.repo_owner }}" `
            -GitHubRepoName "${{ steps.resolve_repo.outputs.repo_name }}" `
            -VercelToken "$env:VERCEL_TOKEN" `
            -VercelOrgId "$env:VERCEL_ORG_ID" `
            -Domain "${{ inputs.domain }}" `
            -GitRef "${{ inputs.release_ref }}" `
            -SkipDbInit

      - name: Publish summary
        run: |
          echo "Customer onboarding completed." >> $GITHUB_STEP_SUMMARY
          echo "- Customer: ${{ inputs.customer_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- Name: ${{ inputs.customer_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- DB Tier: ${{ inputs.db_tier }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.domain }}" ]; then
            echo "- Domain requested: ${{ inputs.domain }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Release ref: ${{ inputs.release_ref }}" >> $GITHUB_STEP_SUMMARY
