name: Post Onboarding Verify

on:
  workflow_dispatch:
    inputs:
      customer_code:
        description: "Customer code (example: cn)"
        required: true
        type: string
      customer_name:
        description: "Customer display name"
        required: true
        type: string
      app_url:
        description: "Customer app URL (optional, for smoke checks)"
        required: false
        default: ""
        type: string
      domain:
        description: "Customer custom domain (optional)"
        required: false
        default: ""
        type: string
      database_url:
        description: "Customer DATABASE_URL (optional; defaults to secret DATABASE_URL_CN)"
        required: false
        default: ""
        type: string
      database_url_secret_name:
        description: "Optional secret name override (defaults to DATABASE_URL_<CUSTOMER_CODE>)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve database URL
        id: resolve_db_url
        env:
          INPUT_DATABASE_URL: ${{ inputs.database_url }}
          INPUT_DATABASE_URL_SECRET_NAME: ${{ inputs.database_url_secret_name }}
          CUSTOMER_CODE: ${{ inputs.customer_code }}
          DATABASE_URL_CN: ${{ secrets.DATABASE_URL_CN }}
          DATABASE_URL_CHINA: ${{ secrets.DATABASE_URL_CHINA }}
          DATABASE_URL_HK: ${{ secrets.DATABASE_URL_HK }}
          DATABASE_URL_MY: ${{ secrets.DATABASE_URL_MY }}
          DATABASE_URL_MO: ${{ secrets.DATABASE_URL_MO }}
          DATABASE_URL_NEON: ${{ secrets.DATABASE_URL_NEON }}
        run: |
          resolve_secret() {
            local secret_name="$1"
            case "$secret_name" in
              DATABASE_URL_CN) echo "$DATABASE_URL_CN" ;;
              DATABASE_URL_CHINA) echo "$DATABASE_URL_CHINA" ;;
              DATABASE_URL_HK) echo "$DATABASE_URL_HK" ;;
              DATABASE_URL_MY) echo "$DATABASE_URL_MY" ;;
              DATABASE_URL_MO) echo "$DATABASE_URL_MO" ;;
              DATABASE_URL_NEON) echo "$DATABASE_URL_NEON" ;;
              *)
                echo ""
                ;;
            esac
          }

          if [ -n "$INPUT_DATABASE_URL" ]; then
            echo "database_url=$INPUT_DATABASE_URL" >> "$GITHUB_OUTPUT"
          else
            secret_name="$INPUT_DATABASE_URL_SECRET_NAME"
            if [ -z "$secret_name" ]; then
              upper_code="$(printf '%s' "$CUSTOMER_CODE" | tr '[:lower:]' '[:upper:]')"
              secret_name="DATABASE_URL_${upper_code}"
            fi

            runtime_url="$(resolve_secret "$secret_name")"
            if [ -z "$runtime_url" ] && [ "$secret_name" = "DATABASE_URL_CN" ]; then
              runtime_url="$(resolve_secret 'DATABASE_URL_CHINA')"
            fi
            if [ -z "$runtime_url" ] && [ "$secret_name" = "DATABASE_URL_CHINA" ]; then
              runtime_url="$(resolve_secret 'DATABASE_URL_CN')"
            fi
            if [ -z "$runtime_url" ]; then
              echo "No database URL found. Set workflow input database_url or repo secret $secret_name."
              exit 1
            fi
            echo "database_url=$runtime_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run post-onboarding verification
        env:
          CUSTOMER_CODE: ${{ inputs.customer_code }}
          CUSTOMER_NAME: ${{ inputs.customer_name }}
          DATABASE_URL: ${{ steps.resolve_db_url.outputs.database_url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          APP_URL: ${{ inputs.app_url }}
          DOMAIN: ${{ inputs.domain }}
        run: node scripts/post-onboarding-verify.js

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-verification-${{ inputs.customer_code }}
          path: reports/
