      <rect x="48" width="38" height="38" rx="10" fill="#A85C32"/>
      <rect x="96" width="38" height="38" rx="10" fill="#6F7C45"/>
      <rect x="144" width="38" height="38" rx="10" fill="#567D8C"/>
      <rect x="192" width="38" height="38" rx="10" fill="#C18952"/>
      <rect x="240" width="38" height="38" rx="10" fill="#4B9A8B"/>
