    <rect x="1105" y="735" width="90" height="90" rx="18" fill="#2E6F61"/>
    <rect x="1210" y="735" width="90" height="90" rx="18" fill="#A85C32"/>
    <rect x="1315" y="735" width="90" height="90" rx="18" fill="#8C6E3D"/>
