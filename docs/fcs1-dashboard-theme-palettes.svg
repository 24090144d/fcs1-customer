    <text x="1320" y="460" class="hex">#262B25</text>
    <text x="1125" y="452" class="chipTextLight">#262B25</text>

    <rect x="1105" y="499" width="190" height="76" rx="14" fill="#F7F4EC" stroke="#D5CBB7"/>
