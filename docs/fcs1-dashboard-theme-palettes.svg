<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F0E8"/>
      <stop offset="1" stop-color="#EDE8E0"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#8A857E" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 42px Georgia, serif; fill: #1A1714; }
      .subtitle { font: 500 18px 'Segoe UI', sans-serif; fill: #6B6560; }
      .panelTitle { font: 700 26px Georgia, serif; fill: #1A1714; }
      .sectionTitle { font: 700 16px 'Segoe UI', sans-serif; fill: #3D3A35; letter-spacing: 1.5px; }
      .label { font: 600 14px 'Segoe UI', sans-serif; fill: #4A4540; }
      .hex { font: 500 13px Consolas, monospace; fill: #6B6560; }
      .note { font: 500 15px 'Segoe UI', sans-serif; fill: #4A4540; }
      .chipTextLight { font: 700 12px Consolas, monospace; fill: #F8F4EE; }
      .chipTextDark { font: 700 12px Consolas, monospace; fill: #1A1714; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#pageBg)"/>

  <text x="80" y="90" class="title">FCS1 Dashboard Theme Palette</text>
  <text x="80" y="126" class="subtitle">Current implemented palette plus two replacement directions aligned to the same editorial dashboard style.</text>

  <g filter="url(#cardShadow)">
    <rect x="80" y="170" width="450" height="930" rx="24" fill="#FAF7F2" stroke="#D9C8A8"/>
    <rect x="575" y="170" width="450" height="930" rx="24" fill="#FAF7F2" stroke="#D9C8A8"/>
    <rect x="1070" y="170" width="450" height="930" rx="24" fill="#FAF7F2" stroke="#D9C8A8"/>
  </g>

  <g>
    <text x="115" y="225" class="panelTitle">Current Theme</text>
    <text x="115" y="252" class="subtitle">Warm editorial vintage</text>
    <text x="115" y="295" class="sectionTitle">SURFACES</text>

    <rect x="115" y="315" width="190" height="76" rx="14" fill="#1A1916"/>
    <text x="330" y="343" class="label">Outer background</text>
    <text x="330" y="368" class="hex">#1A1916</text>
    <text x="135" y="360" class="chipTextLight">#1A1916</text>

    <rect x="115" y="407" width="190" height="76" rx="14" fill="#252220"/>
